set -g mouse on

# ── Session switcher & per-session status ───────────────────────────────────
# Each session carries a `@state` user-option (pr / active / experimental /
# review), rendered as an emoji in both switchers below.
#
#   prefix s  fzf popup: browse, switch, live pane preview, set status, reorder
#             (see session-switcher.sh)
#   prefix S  native choose-tree fallback (expandable window/pane tree)
bind s display-popup -E -w 90% -h 80% -T " sessions " \
  "~/.config/tmux/session-switcher.sh"
bind S choose-tree -Zs -F "#{?#{==:#{@state},pr},✅ ,#{?#{==:#{@state},active},✏️ ,#{?#{==:#{@state},experimental},🧪 ,#{?#{==:#{@state},review},👀 ,}}}}#{session_name}: #{session_windows} windows#{?session_attached, (attached),}"

# Set the attached session's status directly (the popup does this per-row)
bind C-p set @state pr
bind C-a set @state active
bind C-e set @state experimental
bind C-v set @state review
bind C-d set -u @state

# ── Windows & splits ────────────────────────────────────────────────────────
# Open new windows and splits in the current pane's directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ── Plugins (managed by TPM) ────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Restore pane contents and running programs, not just layout
set -g @resurrect-capture-pane-contents 'on'

# Auto-save every 15 min and auto-restore the last session on tmux start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Keep this line last
run '~/.config/tmux/plugins/tpm/tpm'
